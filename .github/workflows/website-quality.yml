name: Website Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.html"
      - "_layouts/**"
      - "_includes/**"
      - "_config.yml"
      - "_blog_posts/**"
      - "_posts/**"
      - "assets/**"
      - "styles/**"
      - "content/**"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/website-quality.yml"
      - ".cspell.json"
      - ".lychee.toml"
      - ".markdownlint-cli2.yaml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e  # v20
        with:
          globs: |
            **/*.md

  spellcheck:
    name: Spelling
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run CSpell
        uses: streetsidesoftware/cspell-action@76c6f6d52abd57f4bcab5f3fde1bbd4f19a99eb0  # v7
        with:
          config: .cspell.json
          files: |
            **/*.md
          strict: true

  links:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a  # v1
        with:
          ruby-version: "3.1.4"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Check Links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        with:
          args: --config .lychee.toml --no-progress --root-dir _site "_site/**/*.html"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
