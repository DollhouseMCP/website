name: VisiDelta Preview

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.html"
      - "_layouts/**"
      - "_includes/**"
      - "_config.yml"
      - "assets/**"
      - "styles/**"
      - ".github/workflows/visidelta-preview.yml"
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref to compare against for manual runs"
        required: false
        default: "origin/main"

permissions:
  contents: read
  pull-requests: write

jobs:
  visidelta:
    name: Build Rendered Diffs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            ref="${{ github.event.inputs.base_ref }}"
            if [[ -z "$ref" ]]; then
              ref="origin/main"
            fi
            echo "ref=$ref" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate VisiDelta Output
        uses: DollhouseMCP/visidelta@main
        with:
          base_ref: ${{ steps.base.outputs.ref }}
          out_dir: /tmp/visidelta
          mode: build

      - name: Augment Route List For HTML And Jekyll Pages
        shell: bash
        env:
          BASE_REF: ${{ steps.base.outputs.ref }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          base_ref = os.environ["BASE_REF"]
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", f"{base_ref}...HEAD"],
              text=True,
          ).splitlines()

          routes_file = Path("/tmp/visidelta/routes.json")
          routes = json.loads(routes_file.read_text()) if routes_file.exists() else []

          def normalize_route(route: str) -> str:
              if route == "/":
                  return route
              while route.endswith("//"):
                  route = route[:-1]
              return route

          seen = {normalize_route(item["route"]) for item in routes}

          def add_route(source_file: str, route: str) -> None:
              route = normalize_route(route)
              if route in seen:
                  return
              seen.add(route)
              route_id = hashlib.sha1(f"{source_file}:{route}".encode("utf-8")).hexdigest()[:12]
              routes.append({"id": route_id, "file": source_file, "route": route})

          def html_route(path: str) -> str:
              if path == "index.html":
                  return "/"
              if path.endswith("/index.html"):
                  directory = path[: -len("/index.html")].strip("/")
                  return f"/{directory}/" if directory else "/"
              return f"/{path}"

          def markdown_route(path: str):
              if path in {"README.md", "LICENSE", "LICENSING.md"}:
                  return None
              if path.startswith(("docs/", "scripts/", ".github/")):
                  return None
              if path == "index.md":
                  return "/"
              if path.startswith("_posts/"):
                  match = re.match(r"_posts/(\d{4})-(\d{2})-(\d{2})-(.+)\.md$", path)
                  if match:
                      year, month, _day, slug = match.groups()
                      return f"/blog/{year}/{month}/{slug}/"
              if path.endswith("/index.md"):
                  directory = path[: -len("/index.md")].strip("/")
                  return f"/{directory}/" if directory else "/"
              if path.endswith(".md"):
                  return f"/{path[:-3].strip('/')}/"
              return None

          shell_changed = False
          for path in changed:
              if path == "_config.yml" or path.startswith(("_layouts/", "_includes/", "assets/", "styles/")):
                  shell_changed = True

              if path.endswith(".html") and not path.startswith(("mockups/", "_site/")):
                  add_route(path, html_route(path))

              if path.endswith(".md"):
                  route = markdown_route(path)
                  if route:
                      add_route(path, route)

          if shell_changed:
              core_routes = [
                  ("index.html", "/"),
                  ("blog/index.html", "/blog/"),
                  ("about.html", "/about.html"),
                  ("licensing.html", "/licensing.html"),
                  ("blog/launch-announcement.html", "/blog/launch-announcement.html"),
                  ("_posts/2025-09-04-story-behind-dollhousemcp.md", "/blog/2025/09/story-behind-dollhousemcp/"),
              ]
              for source_file, route in core_routes:
                  add_route(source_file, route)

          routes.sort(key=lambda item: item["route"])
          routes_file.write_text(json.dumps(routes, indent=2) + "\n")
          PY

      - name: Upload VisiDelta Artifact
        uses: actions/upload-artifact@v4
        with:
          name: visidelta-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/visidelta
          retention-days: 14

      - name: Comment Preview Instructions
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: visidelta-preview
          message: |
            VisiDelta preview artifact is ready.

            - Base ref: `${{ steps.base.outputs.ref }}`
            - Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Artifact: `visidelta-${{ github.run_id }}-${{ github.run_attempt }}`

            Download the artifact from the workflow run, extract it locally, and open `index.html` to review the rendered diffs.

      - name: Add Run Summary
        shell: bash
        run: |
          {
            echo "## VisiDelta Output"
            echo ""
            echo "- Base ref: \`${{ steps.base.outputs.ref }}\`"
            echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Artifact: \`visidelta-${{ github.run_id }}-${{ github.run_attempt }}\`"
            echo ""
            echo "Download the artifact, extract it, and open \`index.html\` to inspect the rendered comparison."
          } >> "$GITHUB_STEP_SUMMARY"
