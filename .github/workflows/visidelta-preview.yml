name: VisiDelta Preview

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.html"
      - "_layouts/**"
      - "_includes/**"
      - "_config.yml"
      - "assets/**"
      - "styles/**"
      - ".github/workflows/visidelta-preview.yml"
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref to compare against for manual runs"
        required: false
        default: "origin/main"

permissions:
  contents: read
  pull-requests: write

env:
  PREVIEW_REPOSITORY: DollhouseMCP/website-visidelta-preview
  PREVIEW_SITE_BASE: https://dollhousemcp.github.io/website-visidelta-preview

jobs:
  visidelta:
    name: Build Rendered Diffs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Resolve base ref
        id: base
        shell: bash
        env:
          BASE_REF_INPUT: ${{ github.event.inputs.base_ref }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            ref="${BASE_REF_INPUT:-origin/main}"
            if [[ -z "$ref" ]]; then
              ref="origin/main"
            fi
            echo "ref=$ref" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate VisiDelta Output
        uses: DollhouseMCP/visidelta@b8f19974591d94a7c5445dfd5bea68b63bb5db61
        with:
          base_ref: ${{ steps.base.outputs.ref }}
          out_dir: /tmp/visidelta
          mode: build

      - name: Augment Route List For HTML And Jekyll Pages
        shell: bash
        env:
          BASE_REF: ${{ steps.base.outputs.ref }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          base_ref = os.environ["BASE_REF"].strip()
          excluded_prefixes = ("docs/", "scripts/", ".github/")

          try:
              changed = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base_ref}...HEAD"],
                  text=True,
              ).splitlines()
          except subprocess.CalledProcessError as exc:
              raise SystemExit(f"Failed to compute changed files against {base_ref}: {exc}") from exc

          routes_file = Path("/tmp/visidelta/routes.json")
          routes = json.loads(routes_file.read_text()) if routes_file.exists() else []

          def normalize_route(route: str) -> str:
              if route == "/":
                  return route
              return route.rstrip("/")

          seen = {normalize_route(item["route"]) for item in routes}

          def add_route(source_file: str, route: str) -> None:
              route = normalize_route(route)
              if route in seen:
                  return
              seen.add(route)
              route_id = hashlib.sha1(f"{source_file}:{route}".encode("utf-8")).hexdigest()[:12]
              routes.append({"id": route_id, "file": source_file, "route": route})

          def html_route(path: str) -> str:
              if path == "index.html":
                  return "/"
              if path.endswith("/index.html"):
                  directory = path[: -len("/index.html")].strip("/")
                  return f"/{directory}/" if directory else "/"
              return f"/{path}"

          def markdown_route(path: str):
              if path in {"README.md", "LICENSE", "LICENSING.md"}:
                  return None
              if path.startswith(excluded_prefixes):
                  return None
              if path == "index.md":
                  return "/"
              if path.startswith("content/blog/") and path.endswith(".md"):
                  return f"/content/blog/{Path(path).stem}/"
              if path.startswith("_posts/"):
                  match = re.match(r"_posts/(\d{4})-(\d{2})-(\d{2})-(.+)\.md$", path)
                  if match:
                      year, month, _day, slug = match.groups()
                      return f"/blog/{year}/{month}/{slug}/"
              if path.endswith("/index.md"):
                  directory = path[: -len("/index.md")].strip("/")
                  return f"/{directory}/" if directory else "/"
              if path.endswith(".md"):
                  return f"/{path[:-3].strip('/')}/"
              return None

          shell_changed = False
          for path in changed:
              if path == "_config.yml" or path.startswith(("_layouts/", "_includes/", "assets/", "styles/")):
                  shell_changed = True

              if path.endswith(".html") and not path.startswith(("mockups/", "_site/")):
                  add_route(path, html_route(path))

              if path.endswith(".md"):
                  route = markdown_route(path)
                  if route:
                      add_route(path, route)

          if shell_changed:
              core_routes = [
                  ("index.html", "/"),
                  ("blog/index.html", "/blog/"),
                  ("about.html", "/about.html"),
                  ("licensing.html", "/licensing.html"),
                  ("blog/launch-announcement.html", "/blog/launch-announcement.html"),
              ]

              for blog_post in sorted(Path("content/blog").glob("*.md")):
                  route = markdown_route(blog_post.as_posix())
                  if route:
                      core_routes.append((blog_post.as_posix(), route))

              for source_file, route in core_routes:
                  add_route(source_file, route)

          routes.sort(key=lambda item: item["route"])
          routes_file.write_text(json.dumps(routes, indent=2) + "\n")
          PY

      - name: Compute Preview URL
        id: preview_meta
        shell: bash
        env:
          PREVIEW_SITE_BASE: ${{ env.PREVIEW_SITE_BASE }}
        run: |
          set -euo pipefail
          ref_raw="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          ref_slug="$(echo "$ref_raw" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#^-+##; s#-+$##')"
          if [[ -z "$ref_slug" ]]; then
            ref_slug="run-${GITHUB_RUN_ID}"
          fi
          branch_path="website/${ref_slug}"
          preview_path="${branch_path}/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          latest_path="${branch_path}/latest"
          preview_url="${PREVIEW_SITE_BASE}/${preview_path}/"
          latest_url="${PREVIEW_SITE_BASE}/${latest_path}/"
          echo "path=$preview_path" >> "$GITHUB_OUTPUT"
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "latest_path=$latest_path" >> "$GITHUB_OUTPUT"
          echo "latest_url=$latest_url" >> "$GITHUB_OUTPUT"

      - name: Detect Hosted Preview Setup
        id: preview_setup
        shell: bash
        env:
          PREVIEW_TOKEN: ${{ secrets.VISIDELTA_PREVIEW_PAGES_TOKEN }}
        run: |
          if [[ -n "$PREVIEW_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Hosted Preview
        if: ${{ steps.preview_setup.outputs.enabled == 'true' }}
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          personal_token: ${{ secrets.VISIDELTA_PREVIEW_PAGES_TOKEN }}
          external_repository: ${{ env.PREVIEW_REPOSITORY }}
          publish_branch: gh-pages
          publish_dir: /tmp/visidelta
          destination_dir: ${{ steps.preview_meta.outputs.path }}
          keep_files: true
          force_orphan: false
          enable_jekyll: false

      - name: Publish Hosted Preview (Latest Alias)
        if: ${{ steps.preview_setup.outputs.enabled == 'true' }}
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          personal_token: ${{ secrets.VISIDELTA_PREVIEW_PAGES_TOKEN }}
          external_repository: ${{ env.PREVIEW_REPOSITORY }}
          publish_branch: gh-pages
          publish_dir: /tmp/visidelta
          destination_dir: ${{ steps.preview_meta.outputs.latest_path }}
          keep_files: true
          force_orphan: false
          enable_jekyll: false

      - name: Upload VisiDelta Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: visidelta-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/visidelta
          retention-days: 14

      - name: Comment Preview Links
        if: ${{ github.event_name == 'pull_request' && steps.preview_setup.outputs.enabled == 'true' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          header: visidelta-preview
          message: |
            VisiDelta preview is ready.

            - Base ref: `${{ steps.base.outputs.ref }}`
            - Hosted preview: [Open preview](${{ steps.preview_meta.outputs.url }})
            - Latest preview for this branch: [Open latest preview](${{ steps.preview_meta.outputs.latest_url }})
            - Workflow run: [Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Artifact backup: `visidelta-${{ github.run_id }}-${{ github.run_attempt }}`

      - name: Comment Preview Setup Needed
        if: ${{ github.event_name == 'pull_request' && steps.preview_setup.outputs.enabled != 'true' }}
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          header: visidelta-preview
          message: |
            VisiDelta artifact is ready, but hosted preview links are not enabled yet.

            - Base ref: `${{ steps.base.outputs.ref }}`
            - Workflow run: [Run ${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Artifact backup: `visidelta-${{ github.run_id }}-${{ github.run_attempt }}`

            Add the `VISIDELTA_PREVIEW_PAGES_TOKEN` secret to enable hosted preview links published to `${{ env.PREVIEW_REPOSITORY }}`.

      - name: Add Run Summary
        shell: bash
        run: |
          {
            echo "## VisiDelta Output"
            echo ""
            echo "- Base ref: \`${{ steps.base.outputs.ref }}\`"
            echo "- Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Artifact backup: \`visidelta-${{ github.run_id }}-${{ github.run_attempt }}\`"
            echo ""
            if [[ "${{ steps.preview_setup.outputs.enabled }}" == "true" ]]; then
              echo "- Hosted preview: ${{ steps.preview_meta.outputs.url }}"
              echo "- Latest preview for this branch: ${{ steps.preview_meta.outputs.latest_url }}"
              echo ""
              echo "Hosted preview is published to the dedicated preview Pages site."
            else
              echo "Hosted preview is not enabled yet."
              echo "Add the \`VISIDELTA_PREVIEW_PAGES_TOKEN\` secret to publish previews to \`${{ env.PREVIEW_REPOSITORY }}\`."
            fi
            echo "Artifact is also uploaded for archival and debugging."
          } >> "$GITHUB_STEP_SUMMARY"
