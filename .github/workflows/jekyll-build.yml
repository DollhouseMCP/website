name: Jekyll Build

on:
  pull_request:
    paths:
      - "**/*.html"
      - "**/*.md"
      - "_config.yml"
      - "_includes/**"
      - "_layouts/**"
      - "assets/**"
      - "_blog_posts/**"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/jekyll-build.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.html"
      - "**/*.md"
      - "_config.yml"
      - "_includes/**"
      - "_layouts/**"
      - "assets/**"
      - "_blog_posts/**"
      - "Gemfile"
      - "Gemfile.lock"
      - ".github/workflows/jekyll-build.yml"

permissions:
  contents: read

jobs:
  build:
    name: bundle exec jekyll build
    runs-on: ubuntu-latest
    env:
      JEKYLL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Run workflow helper tests
        run: python3 -m unittest discover -s .github/scripts/tests -p 'test_*.py'

      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64
        with:
          ruby-version: "3.1.4"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Verify built site output
        run: |
          test -d _site
          test -f _site/index.html
          find _site -type f | grep -q .
