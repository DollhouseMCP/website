<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.github.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    {% seo %}

    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }} Blog Feed" href="{{ '/blog/feed.xml' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/atelier.css' | relative_url }}" />
  </head>
  <body{% if page.body_class %} class="{{ page.body_class }}"{% endif %}>
    <div class="page-noise" aria-hidden="true"></div>

    {% include header.html %}

    <main id="main-content"{% if page.main_class %} class="{{ page.main_class }}"{% endif %}>
      {{ content }}
    </main>

    {% include footer.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
