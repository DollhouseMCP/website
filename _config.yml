# Jekyll Configuration for DollhouseMCP Website
# Built for GitHub Pages compatibility

# Site Settings
title: DollhouseMCP
description: "Open-source AI customization through modular elements, local portfolio workflows, and MCP-AQL."
url: "https://dollhousemcp.com"
baseurl: ""
author: Mick Darling
email: contact@dollhousemcp.com

# Build Settings
markdown: kramdown
theme: null # Using custom theme
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Blog Configuration
permalink: /blog/:year/:month/:title/
paginate: 10
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Mick Darling"

# Exclude from processing
exclude:
  - README.md
  - LICENSE
  - CNAME
  - .git
  - .github
  - docs/security
  - mockups
  - SECURITY.md
  - vendor
  - Gemfile
  - Gemfile.lock

# Include specific files
include:
  - _pages
  - .well-known

# Sass/SCSS (if we convert CSS to SCSS later)
sass:
  style: compressed
  sass_dir: styles

# SEO and Social
twitter:
  username: mickdarling
  card: summary_large_image

social:
  name: DollhouseMCP
  links:
    - https://github.com/DollhouseMCP
    - https://www.npmjs.com/package/@dollhousemcp/mcp-server

# Analytics (for future use)
google_analytics: # Add tracking ID when ready

# Feed settings
feed:
  posts_limit: 20
  path: blog/feed.xml
