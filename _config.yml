# Jekyll Configuration for DollhouseMCP Website
# Built for GitHub Pages compatibility

# Site Settings
title: DollhouseMCP
description: "Open-source AI customization through modular elements, local portfolio workflows, and MCP-AQL."
url: "https://dollhousemcp.com"
baseurl: ""
author: Mick Darling
email: contact@dollhousemcp.com

# Build Settings
markdown: kramdown
theme: null # Using custom theme
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Blog Configuration
permalink: /blog/:year/:month/:title/

# Collections
collections:
  blog_posts:
    output: true
    permalink: /blog/:name/

# Defaults
defaults:
  - scope:
      path: "_blog_posts"
      type: "blog_posts"
    values:
      layout: "post"
      author: "Mick Darling"

# Exclude from processing
exclude:
  - README.md
  - LICENSE
  - CNAME
  - .git
  - .github
  - docs/security
  - mockups
  - SECURITY.md
  - vendor
  - Gemfile
  - Gemfile.lock

# Include specific files
include:
  - _pages
  - .well-known

# SEO and Social
twitter:
  username: mickdarling
  card: summary_large_image

social:
  name: DollhouseMCP
  links:
    - https://github.com/DollhouseMCP
    - https://www.npmjs.com/package/@dollhousemcp/mcp-server

# Feed settings
feed:
  collections:
    blog_posts:
      path: blog/feed.xml
