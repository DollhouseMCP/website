max_retries = 2
retry_wait_time = 2
timeout = 20
no_progress = true
exclude = [
  "https://www.linkedin.com/.*",
  "https://dxt.so/.*",
  "https://lobehub.com/.*",
  "https://www.npmjs.com/package/@dollhousemcp/mcp-server.*",
  "https://mcpaql.com/.*",
  # RFC 2606 / 6761 reserved names used in documentation and examples —
  # these should never be resolved by lychee even if a tutorial references them.
  "^https?://localhost(:\\d+)?(/.*)?$",
  "^https?://127\\.0\\.0\\.1(:\\d+)?(/.*)?$",
  "^https?://\\[::1\\](:\\d+)?(/.*)?$",
  "^https?://([a-z0-9-]+\\.)*example\\.(com|org|net)(/.*)?$",
  "^https?://([a-z0-9-]+\\.)*(test|invalid|local)(/.*)?$"
]
